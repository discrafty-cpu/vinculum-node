name: Sync NODE to Hub and Digester

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'engines/**'
      - 'data/**'
      - 'css/**'
      - 'vinculum-tools-api.json'

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NODE
        uses: actions/checkout@v4
        with:
          path: node

      - name: Checkout Hub
        uses: actions/checkout@v4
        with:
          repository: discrafty-cpu/vinculum-hub
          token: ${{ secrets.SYNC_TOKEN }}
          path: hub

      - name: Sync shared assets to Hub
        run: |
          # Hub tools reference ../../shared/vinculum-math.js (flat structure)
          # So engines and CSS go directly into shared/ root, data gets a subdirectory
          mkdir -p hub/shared hub/shared/data

          # Sync engines (flat — Hub tools use ../../shared/vinculum-math.js)
          cp node/engines/*.js hub/shared/

          # Sync CSS (flat — Hub tools use ../../shared/vinculum-tiles.css)
          cp node/css/*.css hub/shared/

          # Sync data (organized in subdirectories)
          cp -R node/data/* hub/shared/data/

          # Sync tool catalog
          cp node/vinculum-tools-api.json hub/shared/

      - name: Create PR to Hub
        uses: peter-evans/create-pull-request@v6
        with:
          path: hub
          token: ${{ secrets.SYNC_TOKEN }}
          commit-message: "Sync shared assets from vinculum-node"
          title: "Sync: Update shared engines and data from NODE"
          body: |
            Automated sync from [vinculum-node](https://github.com/discrafty-cpu/vinculum-node).

            **Changed files synced:**
            - `shared/*.js` — JS engines (flat, matching tool import paths)
            - `shared/*.css` — Shared stylesheets (flat, matching tool import paths)
            - `shared/data/` — Curriculum data files
            - `shared/vinculum-tools-api.json` — Tool catalog

            Review and merge when ready. This will not affect Hub until merged.
          branch: sync/node-update
          delete-branch: true

  sync-to-digester:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NODE
        uses: actions/checkout@v4
        with:
          path: node

      - name: Checkout Digester
        uses: actions/checkout@v4
        with:
          repository: discrafty-cpu/lesson-digester
          token: ${{ secrets.SYNC_TOKEN }}
          path: digester

      - name: Sync shared assets to Digester
        run: |
          # Digester uses organized structure: shared/engines/, shared/data/, shared/css/
          mkdir -p digester/shared/engines digester/shared/data digester/shared/css

          # Sync engines
          cp -R node/engines/* digester/shared/engines/

          # Sync data
          cp -R node/data/* digester/shared/data/

          # Sync CSS
          cp -R node/css/* digester/shared/css/

          # Sync tool catalog
          cp node/vinculum-tools-api.json digester/shared/

      - name: Create PR to Digester
        uses: peter-evans/create-pull-request@v6
        with:
          path: digester
          token: ${{ secrets.SYNC_TOKEN }}
          commit-message: "Sync shared assets from vinculum-node"
          title: "Sync: Update shared engines and data from NODE"
          body: |
            Automated sync from [vinculum-node](https://github.com/discrafty-cpu/vinculum-node).

            **Changed files synced:**
            - `shared/engines/` — JS engines
            - `shared/data/` — Curriculum data files
            - `shared/css/` — Shared stylesheets
            - `shared/vinculum-tools-api.json` — Tool catalog

            Review and merge when ready. This will not affect Digester until merged.
          branch: sync/node-update
          delete-branch: true
